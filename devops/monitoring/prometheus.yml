global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "fashionstore_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FashionStore Application
  - job_name: 'fashionstore'
    static_configs:
      - targets: ['fashionstore-app:8080']
    metrics_path: '/FashionStore/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL Exporter
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Nginx Exporter
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # JVM Metrics
  - job_name: 'jvm-metrics'
    static_configs:
      - targets: ['fashionstore-app:8080']
    metrics_path: '/FashionStore/actuator/prometheus'
    scrape_interval: 15s

  # Application Metrics
  - job_name: 'application-metrics'
    static_configs:
      - targets: ['fashionstore-app:8080']
    metrics_path: '/FashionStore/actuator/metrics'
    scrape_interval: 10s

  # Health Check Metrics
  - job_name: 'health-checks'
    static_configs:
      - targets: ['fashionstore-app:8080']
    metrics_path: '/FashionStore/actuator/health'
    scrape_interval: 30s

  # Custom Business Metrics
  - job_name: 'business-metrics'
    static_configs:
      - targets: ['fashionstore-app:8080']
    metrics_path: '/FashionStore/actuator/prometheus'
    scrape_interval: 60s
