# ====================================================
# FASHIONSTORE HIKARICP CONNECTION POOL CONFIGURATION
# ====================================================
# Optimized for production scalability with high concurrency

# Database Connection Settings
datasource.url=jdbc:mysql://localhost:3306/fashionstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useLocalSessionState=true&useLocalTransactionState=true&rewriteBatchedStatements=true&cacheResultSetMetadata=true&cacheServerConfiguration=true&elideSetAutoCommits=true&maintainTimeStats=false
datasource.username=fashionstore_user
datasource.password=${DB_PASSWORD}
datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Core Configuration
hikari.pool-name=FashionStoreHikariPool
hikari.minimum-idle=10
hikari.maximum-pool-size=50
hikari.idle-timeout=300000
hikari.max-lifetime=1800000
hikari.connection-timeout=20000
hikari.validation-timeout=5000
hikari.leak-detection-threshold=60000

# Connection Testing Configuration
hikari.connection-test-query=SELECT 1
hikari.test-while-idle=true
hikari.test-on-borrow=true
hikari.test-on-return=false

# Performance Optimization Settings
hikari.register-mbeans=true
hikari.platform=mysql
hikari.data-source-properties.cachePrepStmts=true
hikari.data-source-properties.prepStmtCacheSize=250
hikari.data-source-properties.prepStmtCacheSqlLimit=2048
hikari.data-source-properties.useServerPrepStmts=true
hikari.data-source-properties.useLocalSessionState=true
hikari.data-source-properties.rewriteBatchedStatements=true
hikari.data-source-properties.cacheResultSetMetadata=true
hikari.data-source-properties.cacheServerConfiguration=true
hikari.data-source-properties.elideSetAutoCommits=true
hikari.data-source-properties.maintainTimeStats=false

# MySQL Specific Optimizations
hikari.data-source-properties.useSSL=false
hikari.data-source-properties.useUnicode=true
hikari.data-source-properties.characterEncoding=UTF-8
hikari.data-source-properties.serverTimezone=UTC
hikari.data-source-properties.allowPublicKeyRetrieval=true

# Pool Monitoring and Health Checks
hikari.health-check-properties.connectivity-check-query=SELECT 1
hikari.health-check-registry=DEFAULT

# Failover Configuration (for production)
# hikari.initialization-fail-timeout=1
# hikari.isolate-internal-queries=false
# hikari.allow-pool-suspension=false

# Environment-specific configurations
# Development (lower pool size for resource efficiency)
dev.hikari.minimum-idle=5
dev.hikari.maximum-pool-size=20
dev.hikari.max-lifetime=900000

# Testing (minimal pool for unit tests)
test.hikari.minimum-idle=2
test.hikari.maximum-pool-size=10
test.hikari.max-lifetime=300000

# Production (optimized for high load)
prod.hikari.minimum-idle=15
prod.hikari.maximum-pool-size=100
prod.hikari.max-lifetime=1800000
prod.hikari.leak-detection-threshold=30000

# High-load production (for peak traffic)
highload.hikari.minimum-idle=25
highload.hikari.maximum-pool-size=200
highload.hikari.max-lifetime=1200000
highload.hikari.connection-timeout=10000
