name: QA Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend/admin
        run: npm ci
      
      - name: Run unit tests
        working-directory: ./frontend/admin
        run: npm run test:unit
      
      - name: Generate coverage report
        working-directory: ./frontend/admin
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/admin/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  backend-unit-tests:
    name: Backend Unit Tests (JUnit)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run backend unit tests
        working-directory: ./backend
        run: mvn test
      
      - name: Generate test report
        working-directory: ./backend
        if: always()
        run: mvn surefire-report:report
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  integration-tests:
    name: Integration Tests (Cypress)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests
        run: npm run test:integration
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-test-results
          path: cypress/videos/

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run E2E tests
        run: npx playwright test
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  responsive-tests:
    name: Responsive Layout Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run responsive tests
        run: npx playwright test tests/responsive
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: responsive-test-results
          path: test-results/

  accessibility-tests:
    name: Accessibility Tests (Lighthouse CI)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./frontend/admin
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend/admin
        run: npm run build
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true

  api-contract-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: fashionstore_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/api/health; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
      
      - name: Run API contract tests
        run: npx playwright test tests/api-contract
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-contract-test-results
          path: test-results/

  regression-tests:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    needs: [unit-tests, backend-unit-tests, integration-tests, e2e-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install all dependencies
        run: |
          npm ci
          cd frontend/admin && npm ci
      
      - name: Run full regression suite
        run: npm run test:regression
      
      - name: Generate regression report
        run: npm run test:report
      
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: test-reports/

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, backend-unit-tests, integration-tests, e2e-tests, responsive-tests, accessibility-tests, api-contract-tests]
    
    steps:
      - name: Check test results
        run: |
          echo "All tests passed successfully"
          echo "Quality gate passed"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "Quality gate failed - one or more test suites failed"
          exit 1
