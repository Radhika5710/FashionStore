name: FashionStore Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: fashionstore_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Set up test environment
      run: |
        echo "FASHIONSTORE_DB_URL=jdbc:mysql://localhost:3306/fashionstore_test" >> $GITHUB_ENV
        echo "FASHIONSTORE_DB_USER=root" >> $GITHUB_ENV
        echo "FASHIONSTORE_DB_PASSWORD=testpass" >> $GITHUB_ENV
        echo "REDIS_ENABLED=true" >> $GITHUB_ENV
        echo "REDIS_HOST=localhost" >> $GITHUB_ENV
        echo "REDIS_PORT=6379" >> $GITHUB_ENV

    - name: Run unit tests
      run: |
        mvn test -Dtest="**/*Test" -Dspring.profiles.active=test -DfailIfNoTests=false

    - name: Run integration tests
      run: |
        mvn test -Dtest="**/*IntegrationTest" -Dspring.profiles.active=test -DfailIfNoTests=false

    - name: Run security tests
      run: |
        mvn test -Dtest="**/*Security*Test" -Dspring.profiles.active=test -DfailIfNoTests=false

    - name: Run E2E tests
      run: |
        mvn test -Dtest="**/*EndToEnd*Test" -Dspring.profiles.active=test -DfailIfNoTests=false

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit

    - name: Archive test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/failsafe-reports/

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run performance tests
      run: |
        mvn test -Dtest="**/*Performance*Test" -Dspring.profiles.active=test -DfailIfNoTests=false

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: target/performance-reports/

  playwright-e2e:
    name: Playwright E2E Regression Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        cd playwright-tests
        npm install

    - name: Install Playwright Browsers
      run: |
        npx playwright install --with-deps

    - name: Run Playwright Tests
      run: |
        npm run test
      env:
        BASE_URL: http://localhost:8080/FashionStore
